services:
  bot-wa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-downloader-bot
    restart: unless-stopped
    network_mode: host
    init: true
    env_file:
      - .env
    volumes:
      # Persist WhatsApp session (so you don't need to re-scan QR)
      - wa_session:/app/store
      # Temporary downloads directory
      - wa_downloads:/app/downloads
    environment:
      DOWNLOAD_DIR: /app/downloads

volumes:
  wa_session:
    driver: local
  wa_downloads:
    driver: local
